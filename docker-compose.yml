name: wc-hub

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wc_hub
      POSTGRES_USER: wc_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc_hub -d wc_hub"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [control-plane]
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.2
    command: ["-path", "/migrations", "-database", "postgres://wc_hub:${POSTGRES_PASSWORD:-change-me}@postgres:5432/wc_hub?sslmode=disable", "up"]
    volumes:
      - ./back/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [control-plane]
    restart: "no"

  back:
    build:
      context: ./back
      target: runtime
    environment:
      WC_HUB_ENV: ${WC_HUB_ENV:-production}
      WC_HUB_HTTP_ADDR: :8080
      WC_HUB_PUBLIC_URL: ${WC_HUB_PUBLIC_URL:-http://localhost:5173}
      WC_HUB_DATABASE_URL: postgres://wc_hub:${POSTGRES_PASSWORD:-change-me}@postgres:5432/wc_hub?sslmode=disable
      WC_HUB_SELF_PROTECTED: ${WC_HUB_SELF_PROTECTED:-true}
      WC_HUB_LOCAL_TARGET_NAME: ${WC_HUB_LOCAL_TARGET_NAME:-wc-hub-local}
      WC_HUB_LOCAL_COMMAND_ALLOWLIST: ${WC_HUB_LOCAL_COMMAND_ALLOWLIST:-uptime,df,free,ip,ss,journalctl,docker,kubectl}
      WC_HUB_SESSION_TTL: ${WC_HUB_SESSION_TTL:-12h}
      WC_HUB_SECURE_COOKIES: ${WC_HUB_SECURE_COOKIES:-false}
      WC_HUB_ENCRYPTION_KEY: ${WC_HUB_ENCRYPTION_KEY:-}
      WC_HUB_TOTP_ISSUER: ${WC_HUB_TOTP_ISSUER:-WC Hub}
      WC_HUB_DEV_MASTER_LOGIN: ${WC_HUB_DEV_MASTER_LOGIN:-false}
      WC_HUB_DEV_MASTER_TIMEZONE: ${WC_HUB_DEV_MASTER_TIMEZONE:-America/Sao_Paulo}
      WC_HUB_WORKER_ID: ${WC_HUB_WORKER_ID:-wc-hub-1}
      WC_HUB_WORKER_COUNT: ${WC_HUB_WORKER_COUNT:-2}
      PROXMOX_API_URL: ${PROXMOX_API_URL:-}
      PROXMOX_API_TOKEN_ID: ${PROXMOX_API_TOKEN_ID:-}
      PROXMOX_API_TOKEN_SECRET: ${PROXMOX_API_TOKEN_SECRET:-}
      PROXMOX_TLS_CA_PATH: ${PROXMOX_TLS_CA_PATH:-/run/secrets/proxmox_ca.pem}
      PROXMOX_TLS_INSECURE_SKIP_VERIFY: ${PROXMOX_TLS_INSECURE_SKIP_VERIFY:-false}
      PROXMOX_ADDITIONAL_CONFIG_PATHS: ${PROXMOX_ADDITIONAL_CONFIG_PATHS:-/run/secrets/proxmox_ai.env}
      DOCKER_PROXY_URL: ${DOCKER_PROXY_URL:-}
      DOCKER_TLS_CA_PATH: /run/secrets/docker_ca.pem
      DOCKER_CLIENT_CERT_PATH: /run/secrets/docker_client.pem
      DOCKER_CLIENT_KEY_PATH: /run/secrets/docker_client_key.pem
      DOCKER_FALLBACK_SOCKET_PATH: ${DOCKER_FALLBACK_SOCKET_PATH:-}
      KUBERNETES_API_URL: ${KUBERNETES_API_URL:-}
      KUBERNETES_TOKEN_PATH: ${KUBERNETES_TOKEN_PATH:-/run/secrets/kubernetes_service_account_token}
      KUBERNETES_CA_PATH: ${KUBERNETES_CA_PATH:-/run/secrets/kubernetes_ca.pem}
      KUBERNETES_KUBECONFIG_PATH: ${KUBERNETES_KUBECONFIG_PATH:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ALLOWLIST: ${CLOUDFLARE_ACCOUNT_ALLOWLIST:-}
      CLOUDFLARE_ZONE_ALLOWLIST: ${CLOUDFLARE_ZONE_ALLOWLIST:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY_ALLOWLIST: ${GITHUB_REPOSITORY_ALLOWLIST:-}
      TERRAFORM_WORKER_URL: ${TERRAFORM_WORKER_URL:-}
      TERRAFORM_WORKER_TOKEN: ${TERRAFORM_WORKER_TOKEN:-}
      TERRAFORM_WORKSPACE_ALLOWLIST: ${TERRAFORM_WORKSPACE_ALLOWLIST:-}
      MERGERFS_ROOT: ${MERGERFS_ROOT:-/mnt/drive}
      OCI_CONFIG_PATH: ${OCI_CONFIG_PATH:-/run/secrets/oci_config}
      OCI_CONFIG_PROFILE: ${OCI_CONFIG_PROFILE:-DEFAULT}
      WC_HUB_SSH_PRIVATE_KEY_PATH: ${WC_HUB_SSH_PRIVATE_KEY_PATH:-/run/secrets/ssh_private_key}
      WC_HUB_SSH_KNOWN_HOSTS_PATH: ${WC_HUB_SSH_KNOWN_HOSTS_PATH:-/run/secrets/ssh_known_hosts}
      VNC_ALLOWED_TARGETS: ${VNC_ALLOWED_TARGETS:-}
      PBS_API_URL: ${PBS_API_URL:-}
      PBS_API_TOKEN_ID: ${PBS_API_TOKEN_ID:-}
      PBS_API_TOKEN_SECRET: ${PBS_API_TOKEN_SECRET:-}
      PBS_TLS_CA_PATH: ${PBS_TLS_CA_PATH:-/run/secrets/pbs_ca.pem}
      MONITORING_ENABLED: ${MONITORING_ENABLED:-true}
      NUT_SERVER: ${NUT_SERVER:-}
      NUT_UPS_NAME: ${NUT_UPS_NAME:-}
      WOL_ALLOWED_TARGETS: ${WOL_ALLOWED_TARGETS:-}
      WOL_BROADCAST_ADDRESS: ${WOL_BROADCAST_ADDRESS:-255.255.255.255:9}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./ops/secrets:/run/secrets:ro
      - ${MERGERFS_HOST_ROOT:-./ops/storage}:/mnt/drive:rw
    extra_hosts:
      # Docker Desktop cannot route directly through the Windows Tailscale
      # interface. The local-only relay maps this name back to the host gateway.
      - "prox-genesys:host-gateway"
      - "prox-ai:100.96.36.16"
      - "genesys-ubuntu:100.98.249.29"
    healthcheck:
      test: ["CMD", "/app/wc-hub", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  terraform-worker:
    build:
      context: ./back
      target: terraform-worker
    network_mode: "service:back"
    environment:
      TERRAFORM_WORKER_ADDR: 127.0.0.1:8090
      TERRAFORM_WORKER_TOKEN: ${TERRAFORM_WORKER_TOKEN:-}
      TERRAFORM_WORKSPACE_ALLOWLIST: ${TERRAFORM_WORKSPACE_ALLOWLIST:-}
      TERRAFORM_WORKSPACE_ROOT: /workspaces
      TERRAFORM_STATE_ROOT: /state
      TF_VAR_tenancy_ocid: ${OCI_TENANCY_OCID:-}
      OCI_CLI_CONFIG_FILE: /run/secrets/oci_config
    depends_on:
      back:
        condition: service_healthy
      terraform-state-init:
        condition: service_completed_successfully
    volumes:
      - ./ops/terraform/workspaces:/workspaces:ro
      - ./ops/secrets:/run/secrets:ro
      - ./ops/secrets/oci_config:/.oci/config:ro
      - terraform_state:/state
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:exec,mode=1777
    security_opt: [no-new-privileges:true]

  terraform-state-init:
    image: alpine:3.22
    command: ["chown", "-R", "65532:65532", "/state"]
    volumes:
      - terraform_state:/state
    restart: "no"
    security_opt: [no-new-privileges:true]

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: /api
    ports:
      - "${WC_HUB_BIND_IP:-127.0.0.1}:${WC_HUB_PORT:-8088}:8080"
    depends_on:
      back:
        condition: service_healthy
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run, /tmp]
    security_opt: [no-new-privileges:true]

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    profiles: [agent]
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      # Docker Desktop/WSL does not support propagation mode rslave for this mount.
      - /:/rootfs:ro
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]

  host-agent:
    build:
      context: ./back
      target: agent
    profiles: [agent]
    environment:
      WC_AGENT_TOKEN: ${WC_AGENT_TOKEN:-}
      WC_HUB_URL: http://back:8080
      NODE_EXPORTER_URL: http://node-exporter:9100/metrics
      DCGM_EXPORTER_URL: ${DCGM_EXPORTER_URL:-}
      WC_AGENT_INTERVAL: ${WC_AGENT_INTERVAL:-15s}
      WC_AGENT_SELF_PROTECTED: ${WC_AGENT_SELF_PROTECTED:-true}
      WC_AGENT_LISTEN: 127.0.0.1:9105
    depends_on:
      back:
        condition: service_healthy
      node-exporter:
        condition: service_started
    volumes:
      - ./ops/secrets:/run/secrets:ro
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-distroless
    profiles: [nvidia]
    cap_add: [SYS_ADMIN]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]

networks:
  control-plane:
    driver: bridge

volumes:
  postgres_data:
  terraform_state:
