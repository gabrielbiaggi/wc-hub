name: wc-hub

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wc_hub
      POSTGRES_USER: wc_hub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wc_hub -d wc_hub"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [control-plane]
    restart: unless-stopped

  migrate:
    image: migrate/migrate:v4.18.2
    command: ["-path", "/migrations", "-database", "postgres://wc_hub:${POSTGRES_PASSWORD:-change-me}@postgres:5432/wc_hub?sslmode=disable", "up"]
    volumes:
      - ./back/db/migrations:/migrations:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [control-plane]
    restart: "no"

  back:
    build:
      context: ./back
      target: runtime
    environment:
      WC_HUB_ENV: ${WC_HUB_ENV:-production}
      WC_HUB_HTTP_ADDR: :8080
      WC_HUB_PUBLIC_URL: ${WC_HUB_PUBLIC_URL:-http://localhost:5173}
      WC_HUB_DATABASE_URL: postgres://wc_hub:${POSTGRES_PASSWORD:-change-me}@postgres:5432/wc_hub?sslmode=disable
      WC_HUB_SELF_PROTECTED: ${WC_HUB_SELF_PROTECTED:-true}
      WC_HUB_LOCAL_TARGET_NAME: ${WC_HUB_LOCAL_TARGET_NAME:-wc-hub-local}
      WC_HUB_LOCAL_COMMAND_ALLOWLIST: ${WC_HUB_LOCAL_COMMAND_ALLOWLIST:-uptime,df,free,ip,ss,journalctl,docker,kubectl}
      WC_HUB_SESSION_TTL: ${WC_HUB_SESSION_TTL:-12h}
      WC_HUB_SECURE_COOKIES: ${WC_HUB_SECURE_COOKIES:-false}
      WC_HUB_ENCRYPTION_KEY: ${WC_HUB_ENCRYPTION_KEY:-}
      WC_HUB_TOTP_ISSUER: ${WC_HUB_TOTP_ISSUER:-WC Hub}
      WC_HUB_WORKER_ID: ${WC_HUB_WORKER_ID:-wc-hub-1}
      WC_HUB_WORKER_COUNT: ${WC_HUB_WORKER_COUNT:-2}
      PROXMOX_API_URL: ${PROXMOX_API_URL:-}
      PROXMOX_API_TOKEN_ID: ${PROXMOX_API_TOKEN_ID:-}
      PROXMOX_API_TOKEN_SECRET: ${PROXMOX_API_TOKEN_SECRET:-}
      PROXMOX_TLS_CA_PATH: ${PROXMOX_TLS_CA_PATH:-/run/secrets/proxmox_ca.pem}
      DOCKER_PROXY_URL: ${DOCKER_PROXY_URL:-}
      DOCKER_TLS_CA_PATH: ${DOCKER_TLS_CA_PATH:-/run/secrets/docker_ca.pem}
      DOCKER_CLIENT_CERT_PATH: ${DOCKER_CLIENT_CERT_PATH:-/run/secrets/docker_client.pem}
      DOCKER_CLIENT_KEY_PATH: ${DOCKER_CLIENT_KEY_PATH:-/run/secrets/docker_client_key.pem}
      KUBERNETES_API_URL: ${KUBERNETES_API_URL:-}
      KUBERNETES_TOKEN_PATH: ${KUBERNETES_TOKEN_PATH:-/run/secrets/kubernetes_service_account_token}
      KUBERNETES_CA_PATH: ${KUBERNETES_CA_PATH:-/run/secrets/kubernetes_ca.pem}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ALLOWLIST: ${CLOUDFLARE_ACCOUNT_ALLOWLIST:-}
      CLOUDFLARE_ZONE_ALLOWLIST: ${CLOUDFLARE_ZONE_ALLOWLIST:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY_ALLOWLIST: ${GITHUB_REPOSITORY_ALLOWLIST:-}
      TERRAFORM_WORKER_URL: ${TERRAFORM_WORKER_URL:-}
      TERRAFORM_WORKER_TOKEN: ${TERRAFORM_WORKER_TOKEN:-}
      TERRAFORM_WORKSPACE_ALLOWLIST: ${TERRAFORM_WORKSPACE_ALLOWLIST:-}
      MERGERFS_ROOT: ${MERGERFS_ROOT:-/mnt/drive}
      WC_HUB_SSH_PRIVATE_KEY_PATH: ${WC_HUB_SSH_PRIVATE_KEY_PATH:-/run/secrets/ssh_private_key}
      WC_HUB_SSH_KNOWN_HOSTS_PATH: ${WC_HUB_SSH_KNOWN_HOSTS_PATH:-/run/secrets/ssh_known_hosts}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./ops/secrets:/run/secrets:ro
      - ${MERGERFS_HOST_ROOT:-./ops/storage}:/mnt/drive:ro
    healthcheck:
      test: ["CMD", "/app/wc-hub", "healthcheck"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  front:
    build:
      context: ./front
      args:
        VITE_API_URL: /api
    ports:
      - "${WC_HUB_PORT:-8088}:8080"
    depends_on:
      back:
        condition: service_healthy
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/var/cache/nginx, /var/run, /tmp]
    security_opt: [no-new-privileges:true]

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.11.1
    profiles: [agent]
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro,rslave
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]

  host-agent:
    build:
      context: ./back
      target: agent
    profiles: [agent]
    environment:
      WC_AGENT_TOKEN: ${WC_AGENT_TOKEN:-}
      WC_HUB_URL: http://back:8080
      NODE_EXPORTER_URL: http://node-exporter:9100/metrics
      DCGM_EXPORTER_URL: ${DCGM_EXPORTER_URL:-}
      WC_AGENT_INTERVAL: ${WC_AGENT_INTERVAL:-15s}
      WC_AGENT_SELF_PROTECTED: ${WC_AGENT_SELF_PROTECTED:-true}
      WC_AGENT_LISTEN: 127.0.0.1:9105
    depends_on:
      back:
        condition: service_healthy
      node-exporter:
        condition: service_started
    volumes:
      - ./ops/secrets:/run/secrets:ro
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.5.3-4.8.2-distroless
    profiles: [nvidia]
    cap_add: [SYS_ADMIN]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks: [control-plane]
    restart: unless-stopped
    read_only: true
    security_opt: [no-new-privileges:true]

networks:
  control-plane:
    driver: bridge

volumes:
  postgres_data:
