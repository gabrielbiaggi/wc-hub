components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    Session:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        expires_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        display_name:
          type: string
        totp_enabled:
          type: boolean
        disabled_at:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string

    CreateUserRequest:
      type: object
      required: [email, password, display_name, role_ids]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        display_name:
          type: string
        role_ids:
          type: array
          items:
            type: string

    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
        display_name:
          type: string
        disabled:
          type: boolean
        role_ids:
          type: array
          items:
            type: string

    Role:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
        user_count:
          type: integer

    CreateRoleRequest:
      type: object
      required: [slug, name, permission_ids]
      properties:
        slug:
          type: string
          pattern: '^[a-z][a-z0-9-]{2,47}$'
        name:
          type: string
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: string

    UpdateRoleRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        permission_ids:
          type: array
          items:
            type: string

    Permission:
      type: object
      properties:
        id:
          type: string
        slug:
          type: string
        description:
          type: string
        risk:
          type: string
          enum: [safe, dangerous, critical]

    PolicyRequest:
      type: object
      required: [action, scope, target_name]
      properties:
        action:
          type: string
          example: "terraform_destroy"
        scope:
          type: string
          enum: [local, remote]
        target_name:
          type: string
          example: "terraform/workspace/prod"
        confirmation:
          type: string
          example: "yes"
        totp_code:
          type: string

    PolicyDecision:
      type: object
      properties:
        allowed:
          type: boolean
        risk:
          type: string
          enum: [safe, dangerous, critical]
        reason:
          type: string
        requires_confirmation:
          type: boolean
        requires_totp:
          type: boolean

    AuditRecord:
      type: object
      properties:
        id:
          type: string
        actor_id:
          type: string
        action:
          type: string
        scope:
          type: string
        resource_type:
          type: string
        target_name:
          type: string
        risk:
          type: string
        decision:
          type: string
          enum: [allowed, denied]
        reason:
          type: string
        source_ip:
          type: string
        request_id:
          type: string
        created_at:
          type: string
          format: date-time

    DockerContainer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        image:
          type: string
        state:
          type: string
        status:
          type: string
        created:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    
    Forbidden:
      description: Acesso negado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
