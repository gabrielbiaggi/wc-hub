openapi: 3.0.3
info:
  title: WC-Hub API
  version: 1.0.0
  description: |
    WC-Hub é um control plane multi-cloud para gerenciamento unificado de infraestrutura.
    
    **Recursos principais:**
    - Gestão de VMs/containers (Proxmox, Docker, Kubernetes, OCI)
    - Infraestrutura como código (Terraform)
    - Integrations (GitHub, Cloudflare)
    - RBAC granular com policy enforcement
    - Audit logging completo
    - Terminal SSH via WebSocket
    
    **Autenticação:**
    - Session-based authentication com cookies HTTPOnly
    - TOTP 2FA opcional
    - Policy enforcement para ações críticas (X-Confirmation + X-TOTP-Code headers)
    
  contact:
    name: WC-Hub Development Team
  license:
    name: Proprietary

servers:
  - url: https://hub.example.com
    description: Production
  - url: http://localhost:8080
    description: Development

tags:
  - name: auth
    description: Autenticação e sessões
  - name: admin
    description: Administração (RBAC)
  - name: overview
    description: Dashboard e visão geral
  - name: proxmox
    description: Proxmox VE (VMs, containers, snapshots)
  - name: docker
    description: Docker (containers, images)
  - name: kubernetes
    description: Kubernetes (pods, deployments)
  - name: terraform
    description: Terraform (IaC workflows)
  - name: github
    description: GitHub (repos, workflows, actions)
  - name: cloudflare
    description: Cloudflare (tunnels, DNS)
  - name: storage
    description: Storage (MergerFS file management)
  - name: oci
    description: Oracle Cloud Infrastructure
  - name: monitor
    description: Monitoramento (uptime checks)
  - name: backup
    description: Proxmox Backup Server
  - name: power
    description: Wake-on-LAN
  - name: vnc
    description: VNC/noVNC console
  - name: terminal
    description: SSH Terminal WebSocket
  - name: operations
    description: Operações disponíveis
  - name: jobs
    description: Agendamento de jobs
  - name: telemetry
    description: Telemetria de hosts
  - name: audit
    description: Audit logging
  - name: security
    description: Policy enforcement

security:
  - cookieAuth: []

paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthCheck
      tags: [overview]
      security: []
      responses:
        '200':
          description: Service is healthy

  /api/v1/auth/bootstrap-status:
    get:
      summary: Verifica se sistema precisa de bootstrap
      operationId: getBootstrapStatus
      tags: [auth]
      security: []
      responses:
        '200':
          description: Status do bootstrap
          content:
            application/json:
              schema:
                type: object
                properties:
                  required:
                    type: boolean
                    description: Se true, sistema precisa de usuário inicial

  /api/v1/auth/bootstrap:
    post:
      summary: Criar primeiro usuário god-admin
      operationId: bootstrap
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, display_name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                display_name:
                  type: string
      responses:
        '201':
          description: Usuário criado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Bootstrap já realizado

  /api/v1/auth/login:
    post:
      summary: Autenticar usuário
      operationId: login
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                totp_code:
                  type: string
                  description: TOTP code se usuário tem 2FA ativo
      responses:
        '200':
          description: Login bem-sucedido
          headers:
            Set-Cookie:
              schema:
                type: string
                example: session=abc123; HttpOnly; Secure; SameSite=Strict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/session:
    get:
      summary: Obter sessão atual
      operationId: getSession
      tags: [auth]
      responses:
        '200':
          description: Sessão ativa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      summary: Encerrar sessão
      operationId: logout
      tags: [auth]
      responses:
        '204':
          description: Logout bem-sucedido

  /api/v1/auth/totp/enroll:
    post:
      summary: Iniciar enrollment TOTP
      operationId: enrollTOTP
      tags: [auth]
      responses:
        '200':
          description: QR code e secret para configuração
          content:
            application/json:
              schema:
                type: object
                properties:
                  qr_code:
                    type: string
                    description: Data URL do QR code
                  secret:
                    type: string
                    description: Secret TOTP em plain text (apenas durante enrollment)

  /api/v1/auth/totp/confirm:
    post:
      summary: Confirmar e ativar TOTP
      operationId: confirmTOTP
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  description: Código TOTP de 6 dígitos
      responses:
        '204':
          description: TOTP ativado com sucesso
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/admin/users:
    get:
      summary: Listar usuários
      operationId: listAdminUsers
      tags: [admin]
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: Criar usuário
      operationId: createAdminUser
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/admin/users/{id}:
    patch:
      summary: Atualizar usuário
      operationId: updateAdminUser
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      summary: Desativar usuário
      operationId: disableAdminUser
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '204':
          description: Usuário desativado

  /api/v1/admin/roles:
    get:
      summary: Listar papéis
      operationId: listAdminRoles
      tags: [admin]
      responses:
        '200':
          description: Lista de papéis
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Role'
    post:
      summary: Criar papel
      operationId: createAdminRole
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Papel criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /api/v1/admin/roles/{id}:
    patch:
      summary: Atualizar papel
      operationId: updateAdminRole
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Papel atualizado
    delete:
      summary: Deletar papel
      operationId: deleteAdminRole
      tags: [admin]
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '204':
          description: Papel deletado

  /api/v1/admin/permissions:
    get:
      summary: Listar permissões disponíveis
      operationId: listAdminPermissions
      tags: [admin]
      responses:
        '200':
          description: Catálogo de permissões
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Permission'

  /api/v1/overview:
    get:
      summary: Dashboard overview
      operationId: getOverview
      tags: [overview]
      responses:
        '200':
          description: Visão geral do sistema
          content:
            application/json:
              schema:
                type: object
                properties:
                  clusters:
                    type: integer
                  vms:
                    type: integer
                  containers:
                    type: integer
                  hosts:
                    type: integer

  /api/v1/modules:
    get:
      summary: Listar módulos disponíveis
      operationId: listModules
      tags: [overview]
      responses:
        '200':
          description: Módulos habilitados

  /api/v1/integrations:
    get:
      summary: Listar integrações
      operationId: listIntegrations
      tags: [overview]
      responses:
        '200':
          description: Integrações configuradas
    post:
      summary: Criar integração
      operationId: createIntegration
      tags: [overview]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                type:
                  type: string
                  enum: [proxmox, docker, kubernetes, github, cloudflare]
      responses:
        '201':
          description: Integração criada

  /api/v1/audit:
    get:
      summary: Listar audit log
      operationId: listAudit
      tags: [audit]
      responses:
        '200':
          description: Registros de auditoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditRecord'

  /api/v1/security/evaluate:
    post:
      summary: Avaliar policy para ação crítica
      operationId: evaluatePolicy
      tags: [security]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PolicyRequest'
      responses:
        '200':
          description: Ação permitida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDecision'
        '403':
          description: Ação bloqueada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyDecision'

  /api/v1/docker/containers:
    get:
      summary: Listar containers Docker
      operationId: listDockerContainers
      tags: [docker]
      responses:
        '200':
          description: Lista de containers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DockerContainer'

  /api/v1/docker/containers/{id}/{action}:
    post:
      summary: Executar ação em container
      operationId: dockerContainerAction
      tags: [docker]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [start, stop, restart, kill, remove, pause, unpause]
      requestBody:
        description: Headers para ações destrutivas (stop, kill, remove, restart)
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Ação aceita
        '403':
          description: Ação bloqueada por policy

  /api/v1/docker/containers/{id}/exec:
    post:
      summary: Executar comando em container
      operationId: dockerContainerExec
      tags: [docker]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: X-Confirmation
          in: header
          required: true
          schema:
            type: string
            example: "yes"
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: array
                  items:
                    type: string
                  example: ["ls", "-la", "/app"]
      responses:
        '200':
          description: Comando executado
          content:
            application/json:
              schema:
                type: object
                properties:
                  output:
                    type: string
        '403':
          description: Ação bloqueada por policy

  /api/v1/kubernetes/overview:
    get:
      summary: Overview Kubernetes clusters
      operationId: kubernetesOverview
      tags: [kubernetes]
      responses:
        '200':
          description: Overview clusters

  /api/v1/kubernetes/namespaces/{namespace}/pods/{pod}/exec:
    post:
      summary: Exec em pod Kubernetes
      operationId: kubernetesPodExec
      tags: [kubernetes]
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: pod
          in: path
          required: true
          schema:
            type: string
        - name: X-Confirmation
          in: header
          required: true
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [container, command]
              properties:
                container:
                  type: string
                command:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Comando executado
        '403':
          description: Ação bloqueada por policy

  /api/v1/terraform/runs:
    get:
      summary: Listar Terraform runs
      operationId: listTerraformRuns
      tags: [terraform]
      responses:
        '200':
          description: Lista de runs

  /api/v1/terraform/destroy:
    post:
      summary: Terraform destroy
      operationId: terraformDestroy
      tags: [terraform]
      parameters:
        - name: X-Confirmation
          in: header
          required: true
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace]
              properties:
                workspace:
                  type: string
      responses:
        '202':
          description: Destroy aceito
        '403':
          description: Ação bloqueada por policy
  /api/v1/terraform/apply:
    post:
      summary: Terraform apply
      operationId: terraformApply
      tags: [terraform]
      parameters:
        - name: X-Confirmation
          in: header
          required: true
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace]
              properties:
                workspace:
                  type: string
      responses:
        '202':
          description: Apply aceito
        '403':
          description: Ação bloqueada por policy

  /api/v1/terraform/plan:
    post:
      summary: Terraform plan
      operationId: terraformPlan
      tags: [terraform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace]
              properties:
                workspace:
                  type: string
      responses:
        '202':
          description: Plan aceito

  /api/v1/terraform/validate:
    post:
      summary: Terraform validate
      operationId: terraformValidate
      tags: [terraform]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspace]
              properties:
                workspace:
                  type: string
      responses:
        '202':
          description: Validate aceito

  /api/v1/docker/health:
    get:
      summary: Health check Docker
      operationId: dockerHealth
      tags: [docker]
      responses:
        '200':
          description: Docker status OK

  /api/v1/docker/inventory:
    get:
      summary: Inventário Docker completo
      operationId: dockerInventory
      tags: [docker]
      responses:
        '200':
          description: Inventário retornado

  /api/v1/docker/images:
    get:
      summary: Listar imagens Docker
      operationId: dockerImages
      tags: [docker]
      responses:
        '200':
          description: Lista de imagens

  /api/v1/docker/stats:
    get:
      summary: Estatísticas de containers Docker
      operationId: dockerStats
      tags: [docker]
      responses:
        '200':
          description: Estatísticas em tempo real

  /api/v1/kubernetes/namespaces/{namespace}/pods/{pod}/logs:
    get:
      summary: Logs de pod Kubernetes
      operationId: kubernetesPodLogs
      tags: [kubernetes]
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: pod
          in: path
          required: true
          schema:
            type: string
        - name: container
          in: query
          required: false
          schema:
            type: string
        - name: tail
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: Logs do pod

  /api/v1/kubernetes/namespaces/{namespace}/deployments/{name}/{action}:
    post:
      summary: Ação em deployment Kubernetes (scale, restart, delete)
      operationId: kubernetesDeploymentAction
      tags: [kubernetes]
      parameters:
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [scale, restart, delete]
        - name: X-Confirmation
          in: header
          required: false
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      responses:
        '202':
          description: Ação aceita
        '403':
          description: Ação bloqueada por policy

  /api/v1/proxmox/summary:
    get:
      summary: Resumo do Proxmox
      operationId: proxmoxSummary
      tags: [proxmox]
      responses:
        '200':
          description: Resumo do cluster Proxmox

  /api/v1/proxmox/sync:
    post:
      summary: Sincronizar inventário Proxmox
      operationId: proxmoxSync
      tags: [proxmox]
      responses:
        '202':
          description: Sincronização enfileirada

  /api/v1/proxmox/inventory:
    get:
      summary: Inventário Proxmox
      operationId: proxmoxInventory
      tags: [proxmox]
      responses:
        '200':
          description: Inventário de nós, VMs, LXC e storage

  /api/v1/proxmox/nodes/{node}/{kind}/{vmid}/{action}:
    post:
      summary: Ação de energia em guest Proxmox (start, stop, shutdown, reboot)
      operationId: proxmoxPowerAction
      tags: [proxmox]
      parameters:
        - name: node
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [qemu, lxc]
        - name: vmid
          in: path
          required: true
          schema:
            type: integer
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum: [start, stop, shutdown, reboot, reset]
        - name: X-Confirmation
          in: header
          required: false
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      responses:
        '202':
          description: Ação aceita
        '403':
          description: Ação bloqueada por policy

  /api/v1/proxmox/nodes/{node}/{kind}/{vmid}:
    delete:
      summary: Excluir VM ou LXC Proxmox
      operationId: proxmoxDeleteGuest
      tags: [proxmox]
      parameters:
        - name: node
          in: path
          required: true
          schema:
            type: string
        - name: kind
          in: path
          required: true
          schema:
            type: string
            enum: [qemu, lxc]
        - name: vmid
          in: path
          required: true
          schema:
            type: integer
        - name: X-Confirmation
          in: header
          required: true
          schema:
            type: string
        - name: X-TOTP-Code
          in: header
          required: false
          schema:
            type: string
      responses:
        '204':
          description: Guest excluído
        '403':
          description: Ação bloqueada por policy

  /api/v1/proxmox/qemu:
    post:
      summary: Criar VM QEMU Proxmox
      operationId: createProxmoxQEMU
      tags: [proxmox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: VM criada

  /api/v1/proxmox/lxc:
    post:
      summary: Criar Container LXC Proxmox
      operationId: createProxmoxLXC
      tags: [proxmox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: LXC criado

  /api/v1/proxmox/clone:
    post:
      summary: Clonar guest Proxmox
      operationId: cloneProxmoxGuest
      tags: [proxmox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Clonagem iniciada

  /api/v1/jobs:
    get:
      summary: Listar jobs
      operationId: listJobs
      tags: [jobs]
      responses:
        '200':
          description: Lista de jobs
    post:
      summary: Criar/Enfileirar job
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Job enfileirado

  /api/v1/telemetry/hosts:
    get:
      summary: Telemetria de hosts
      operationId: hostTelemetry
      tags: [telemetry]
      responses:
        '200':
          description: Telemetria recente

  /api/v1/terminal/tickets:
    post:
      summary: Criar ticket de sessão SSH Terminal
      operationId: createTerminalTicket
      tags: [terminal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [host_id, confirmation, totp_code]
              properties:
                host_id:
                  type: string
                confirmation:
                  type: string
                totp_code:
                  type: string
      responses:
        '201':
          description: Ticket gerado
        '403':
          description: Acesso bloqueado por policy

  /api/v1/agents/hosts/{host_id}/token:
    post:
      summary: POST /api/v1/agents/hosts/{host_id}/token
      operationId: post_agents_hosts_host_id_token
      tags: [agents]
      parameters:
        - name: host_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Operação concluída
        '400':
